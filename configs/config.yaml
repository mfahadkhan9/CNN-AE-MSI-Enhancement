project_name: CNN-AE-MSI-Enhancement
seed: 42
device: auto  # auto, cuda, or cpu

model:
  in_channels: 3
  base_channels: 64

data:
  # Organize images by wavelength, for example:
  # data/train/600nm/*.png, data/train/620nm/*.png, etc.
  train_dir: data/train
  val_dir: data/val
  test_dir: data/test

  # Optional paired targets. Leave empty/null for self-reconstruction training.
  target_train_dir:
  target_val_dir:
  target_test_dir:

  image_size: 256

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  num_workers: 2

paths:
  checkpoint_dir: checkpoints
  enhanced_dir: results/enhanced_images
  figures_dir: results/figures
  metrics_dir: results/metrics
